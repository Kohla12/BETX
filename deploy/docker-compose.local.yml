version: "3.9"

services:
  nginx:
    build:
      context: ..
      dockerfile: ./deploy/docker/nginx.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
      - frontend
      - realtime
    volumes:
      - ../deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  api:
    build:
      context: ../backend-laravel
      dockerfile: ../deploy/docker/laravel.Dockerfile
    env_file:
      - ../infra/env/api.env.example
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/docker/frontend.Dockerfile
    env_file:
      - ../infra/env/frontend.env.example

  realtime:
    build:
      context: ../realtime-node
      dockerfile: ../deploy/docker/node-realtime.Dockerfile
    env_file:
      - ../infra/env/realtime.env.example
    depends_on:
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: betx
      POSTGRES_USER: betx
      POSTGRES_PASSWORD: betx_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:

